# Musl targets default to static linking, but NAPI-RS native bindings are
# shared libraries (cdylib) loaded by Node.js, so we must disable crt-static.
[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-feature=-crt-static"]

[target.aarch64-unknown-linux-musl]
rustflags = ["-C", "target-feature=-crt-static"]
