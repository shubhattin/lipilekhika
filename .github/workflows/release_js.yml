name: Release NPM Package

on:
  push:
    tags:
      - 'js-lib@v*'
  workflow_dispatch:
    # This would work only if the package version was already not published to npm
    inputs:
      tag:
        description: "Tag corresponding to the npm version (e.g. js-lib@v1.2.3)"
        required: true
      npm_dist_tag:
        description: "npm dist-tag to publish under (e.g. beta, latest)"
        required: false
        default: "beta"

permissions:
  id-token: write  # Required for OIDC
  contents: read

env:
  NODE_VERSION: '24'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # Resolve & validate tag
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Resolved tag: $TAG"

      - name: Read package.json version
        id: pkg_version
        shell: bash
        run: |
          VERSION=$(jq -r '.version' packages/js/package.json)
          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "Failed to read version from package.json"
            exit 1
          fi

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      - name: Verify tag matches package version
        shell: bash
        run: |
          TAG="${{ steps.release_tag.outputs.TAG }}"
          VERSION="${{ steps.pkg_version.outputs.VERSION }}"

          EXPECTED="js-lib@v$VERSION"
          if [[ "$TAG" != "$EXPECTED" ]]; then
            echo "❌ Tag ($TAG) does not match expected tag ($EXPECTED)"
            exit 1
          fi

          echo "✅ Tag matches package version"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - uses: jetli/wasm-pack-action@v0.4.0

      - name: Generate Test Data
        run: |
          bun install
          bun run gen:test-data

      - name: Generate Script Data
        run: |
          cd packages/js
          bun install
          bun run make-script-data

      - name: Build WASM
        run: |
          cd packages/js/wasm
          wasm-pack build --release --target web

      - name: Build Node Binding
        run: |
          cd packages/js/binding
          ./gen_node_bind.sh

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Build and Test Package
        run: |
          cd packages/js
          bun run build
          bun test --only-failures

  build-native:
    needs: test
    strategy:
      matrix:
        include:
          - name: linux-x64-gnu
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            node_file: index.linux-x64-gnu.node
            include_loader: true
          - name: linux-arm64-gnu
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            node_file: index.linux-arm64-gnu.node
            include_loader: false
          - name: macos-x64
            runner: macos-13
            target: x86_64-apple-darwin
            node_file: index.darwin-x64.node
            include_loader: false
          - name: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            node_file: index.darwin-arm64.node
            include_loader: false
          - name: windows-x64-msvc
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            node_file: index.win32-x64-msvc.node
            include_loader: false
          - name: windows-arm64-msvc
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            node_file: index.win32-arm64-msvc.node
            include_loader: false
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Build native binding for target
        shell: bash
        run: |
          cd packages/js/binding
          rm -rf pkg
          TARGET="${{ matrix.target }}" ./gen_node_bind.sh

      - name: Upload primary binding package
        if: ${{ matrix.include_loader }}
        uses: actions/upload-artifact@v4
        with:
          name: native-binding-${{ matrix.name }}
          path: packages/js/binding/pkg

      - name: Upload target node artifact
        if: ${{ !matrix.include_loader }}
        uses: actions/upload-artifact@v4
        with:
          name: native-binding-${{ matrix.name }}
          path: packages/js/binding/pkg/${{ matrix.node_file }}

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [test, build-native]
    environment:
      name: release

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - uses: jetli/wasm-pack-action@v0.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Download native binding artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-binding-*
          path: packages/js/binding/pkg
          merge-multiple: true

      - name: Verify merged native binding artifacts
        shell: bash
        run: |
          ls -la packages/js/binding/pkg
          test -f packages/js/binding/pkg/index.cjs
          test -f packages/js/binding/pkg/index.d.ts
          test -f packages/js/binding/pkg/index.mjs
          for file in \
            index.linux-x64-gnu.node \
            index.linux-arm64-gnu.node \
            index.darwin-x64.node \
            index.darwin-arm64.node \
            index.win32-x64-msvc.node \
            index.win32-arm64-msvc.node; do
            test -f "packages/js/binding/pkg/$file"
          done

      - name: Generate Test Data
        run: |
          bun install
          bun run gen:test-data

      - name: Generate Script Data
        run: |
          cd packages/js
          bun install
          bun run make-script-data

      - name: Build WASM
        run: |
          cd packages/js/wasm
          wasm-pack build --release --target web

      - name: Build package with merged native artifacts
        run: |
          cd packages/js
          bun run build
          bun run test:run -- tests/check_binding.test.ts

      - name: Verify packaged native artifacts
        shell: bash
        run: |
          ls -la packages/js/dist/binding/pkg
          test -f packages/js/dist/binding/pkg/index.cjs
          test -f packages/js/dist/binding/pkg/index.d.ts
          test -f packages/js/dist/binding/pkg/index.mjs
          for file in \
            index.linux-x64-gnu.node \
            index.linux-arm64-gnu.node \
            index.darwin-x64.node \
            index.darwin-arm64.node \
            index.win32-x64-msvc.node \
            index.win32-arm64-msvc.node; do
            test -f "packages/js/dist/binding/pkg/$file"
          done

      - name: Read package.json version (publish job)
        id: pkg_version_publish
        shell: bash
        run: |
          VERSION=$(jq -r '.version' packages/js/package.json)
          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "Failed to read version from package.json"
            exit 1
          fi

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version (publish job): $VERSION"

      - name: Resolve npm dist-tag
        id: npm_dist_tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            DIST_TAG="${{ inputs.npm_dist_tag }}"
          else
            # Heuristic: prerelease versions (e.g. 1.2.3-beta.1) publish under beta tag by default.
            VERSION="${{ steps.pkg_version_publish.outputs.VERSION }}"
            if [[ "$VERSION" == *-* ]]; then
              DIST_TAG="beta"
            else
              DIST_TAG="latest"
            fi
          fi

          if [[ -z "$DIST_TAG" ]]; then
            echo "npm dist-tag is empty; aborting."
            exit 1
          fi

          echo "DIST_TAG=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved npm dist-tag: $DIST_TAG"

      - name: Publish to npm
        run: |
          cd packages/js
          npm publish --tag "${{ steps.npm_dist_tag.outputs.DIST_TAG }}"
