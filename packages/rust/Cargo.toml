[package]
name = "lipilekhika"
license = "MIT"
description = "A transliteration library for Indian Brahmic scripts"
homepage = "https://lipilekhika.in"
repository = "https://github.com/shubhattin/lipilekhika"
documentation = "https://lipilekhika.in/getting-started/rust"
keywords = ["indic-scripts", "transliteration"]
categories = ["text-processing", "localization"]

version = "1.1.2"
edition = "2024"
rust-version = "1.85.0"
include = [
    "src/**/*",
    "build.rs",
    "scripts_rs_builder.rs",
    "Cargo.toml",
    "LICENSE*",
    "README*",
]


[dependencies]
serde = { version = "1.0", default-features = false, features = [
    "derive",
    "alloc",
] }
bincode = { version = "2", default-features = false, features = [
    "serde",
    "alloc",
] }
hashbrown = { version = "0.15", default-features = false, features = [
    "alloc",
    "serde",
    "default-hasher",
] }
foldhash = { version = "0.1", default-features = false }
indexmap = { version = "2", default-features = false, features = ["serde"] }
once_cell = { version = "1.21", default-features = false, features = [
    "alloc",
    "race",
] }
strum = { version = "0.28.0", default-features = false, features = ["derive"] }

[features]
default = []
# Uses `std::time` for `TypingContext` idle auto-clear (`auto_context_clear_time_ms`).
std = []

[dev-dependencies]
clap = { version = "4.5.54", features = ["derive"] }
criterion = { version = "0.5.1", default-features = true }
owo-colors = "4.2.0"
serde_yaml_ng = "0.10.0"

[build-dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.148"
bincode = { version = "2", default-features = false, features = [
    "serde",
    "alloc",
] }
hashbrown = { version = "0.15", default-features = false, features = [
    "alloc",
    "serde",
    "default-hasher",
] }
foldhash = { version = "0.1", default-features = false }
indexmap = { version = "2", default-features = false, features = ["serde"] }
quote = "1.0"
syn = { version = "2.0", features = ["full"] }
prettyplease = "0.2"

[lib]
crate-type = ["rlib"]

[[bench]]
name = "benchmark"
path = "src/benches/benchmark.rs"
harness = false
