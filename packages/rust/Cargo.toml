[package]
name = "lipilekhika"
license = "MIT"
description = "A transliteration library for Indian Brahmic scripts"
homepage = "https://lipilekhika.in"
repository = "https://github.com/shubhattin/lipilekhika"
documentation = "https://lipilekhika.in/getting-started/rust"
keywords = ["indic-scripts", "transliteration"]
categories = ["text-processing", "localization"]

version = "1.1.0"
edition = "2024"
rust-version = "1.85.0"
include = [
    "src/**/*",
    "build.rs",
    "scripts_rs_builder.rs",
    "Cargo.toml",
    "LICENSE*",
    "README*",
]


[dependencies]
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3.3"
indexmap = { version = "2", features = ["serde"] }
strum = { version = "0.28.0", features = ["derive"] }

[dev-dependencies]
clap = { version = "4.5.54", features = ["derive"] }
criterion = { version = "0.5.1", default-features = true }
owo-colors = "4.2.0"
serde_yaml_ng = "0.10.0"

[build-dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.148"
bincode = "1.3.3"
indexmap = { version = "2", features = ["serde"] }
quote = "1.0"
syn = { version = "2.0", features = ["full"] }
prettyplease = "0.2"

[lib]
crate-type = ["rlib"]

[[bench]]
name = "benchmark"
path = "src/benches/benchmark.rs"
harness = false
